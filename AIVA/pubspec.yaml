name: aiva
description: "AIVA - Your lecture. Your language. Your answers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  get: ^4.6.6
  dio: ^5.4.3+1
  shared_preferences: ^2.3.2
  video_player: ^2.9.1
  chewie: ^1.8.5
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3+1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/svg/
